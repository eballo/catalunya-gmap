name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install dependencies
        run: yarn
      - name: Test and coverage
        run: yarn jest --coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [21.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test

  release:
    name: Bump version, tag and release
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'Bump version:')
    needs: [ sonarcloud, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout main (full history + tags)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Determine bump level from source branch
        id: bump
        env:
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Find the PR associated with this commit (works for merge & squash)
          PR_JSON=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
                           -H "Accept: application/vnd.github+json" \
                           "https://api.github.com/repos/$REPO/commits/$SHA/pulls")
          SRC_BRANCH=$(printf '%s' "$PR_JSON" | jq -r '.[0].head.ref // empty')
          PR_TITLE=$(printf '%s' "$PR_JSON" | jq -r '.[0].title // empty')

          # Fallback: parse default merge message if no PR is linked
          if [ -z "$SRC_BRANCH" ]; then
            MERGE_MSG=$(git log -1 --pretty=%B)
            SRC_FULL=$(printf '%s' "$MERGE_MSG" | sed -n 's/.*from \([^ ]*\).*/\1/p')
            SRC_BRANCH="${SRC_FULL#*/}"
          fi
          if [ -z "$PR_TITLE" ]; then
            PR_TITLE=$(git log -1 --pretty=%s)
          fi

          echo "Source branch: ${SRC_BRANCH:-<unknown>}"
          echo "PR title: ${PR_TITLE:-<unknown>}"

          case "$SRC_BRANCH" in
            fix/*)   LEVEL=patch ;;
            major/*) LEVEL=major ;;
            *)       LEVEL=minor ;;
          esac

          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          {
            echo "pr_title<<EOF"
            echo "$PR_TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Bump version (package.json + package-lock.json)
        id: version
        run: |
          set -euo pipefail
          OLD_VERSION=$(node -p "require('./package.json').version")
          npm version "${{ steps.bump.outputs.level }}" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")

          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update changelog.md, demo.md and web/index.html
        id: notes
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          PR_TITLE: ${{ steps.bump.outputs.pr_title }}
        run: |
          set -euo pipefail
          node - <<'JS'
          const fs = require('fs');

          const version = process.env.NEW_VERSION.trim();
          const title = (process.env.PR_TITLE || '').trim() || 'Maintenance update';
          const [major, minor, patch] = version.split('.').map(Number);

          const slug = (minor === 0 && patch === 0) ? `gmap${major}`
                     : (patch === 0) ? `gmap${major}${minor}`
                     : `gmap${major}${minor}${patch}`;
          const label = (patch === 0) ? `v${major}.${minor}` : `v${major}.${minor}.${patch}`;

          // changelog.md
          const changelogPath = 'changelog.md';
          const changelog = fs.readFileSync(changelogPath, 'utf8');
          const date = new Date().toISOString().slice(0, 10);
          const entry = `## [${version}] - ${date}\n\n### Changed\n- ${title}\n\n`;
          const marker = 'All notable changes to this project will be documented in this file.\n\n';
          const idx = changelog.indexOf(marker);
          if (idx === -1) throw new Error('Could not find changelog insertion point');
          const insertAt = idx + marker.length;
          fs.writeFileSync(changelogPath, changelog.slice(0, insertAt) + entry + changelog.slice(insertAt));

          // demo.md
          const demoPath = 'demo.md';
          const demo = fs.readFileSync(demoPath, 'utf8').replace(/\n+$/, '');
          fs.writeFileSync(demoPath, `${demo}\n- [Demo ${label}](http://demo.catalunyamedieval.es/${slug})\n`);

          // web/index.html
          const htmlPath = 'web/index.html';
          const html = fs.readFileSync(htmlPath, 'utf8');
          const upperLabel = 'V' + label.slice(1);
          const updatedHtml = html.replace(/Demo V\d+(\.\d+){1,2}/g, `Demo ${upperLabel}`);
          fs.writeFileSync(htmlPath, updatedHtml);

          // Release notes reused for the GitHub Release
          fs.writeFileSync('/tmp/release-notes.md', `## ${label}\n\n### Changed\n- ${title}\n`);
          JS

      - name: Commit, tag and push
        run: |
          set -euo pipefail
          git add package.json package-lock.json changelog.md demo.md web/index.html
          git commit -m "Bump version: ${{ steps.version.outputs.old_version }} -> ${{ steps.version.outputs.new_version }}"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"
          git push --follow-tags origin main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes-file /tmp/release-notes.md \
            --latest
